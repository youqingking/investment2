interface:
  display_name: "SDD-RIPER ONE"
  short_description: "重型 Harness 教练与控盘协议：澄清目标、生成 CodeMap/Context、拆分最小混沌单元、维护 Spec、阶段门禁推进。"
  default_prompt: "Use $sdd-riper-one as a heavy Harness coach/control layer. First check visible prompt files for one/light routing; if missing, ask before creating/updating minimal AGENTS.md/CLAUDE.md/etc. Clarify final goal, use codemap/context when needed, assess the current minimum chaos unit, and persist goal/scope/decisions/progress/risks/validation in the spec. No code before spec, clear task unit, validation, and exact Plan Approved. At checkpoints, summarize phase, approval, spec path, goal, task unit, scope, checklist, open questions, risks, and next action; re-read only relevant spec sections when needed. Load references only when needed; spec is truth."

policy:
  allow_implicit_invocation: false
